services:
  shopping-list:
    image: ghcr.io/pansalut/koffan:latest
    container_name: ${CONTAINER_NAME}_main
    labels:
      - autoheal-app=true
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "8584:80"
    environment:
      TZ: ${TZ:-Europe/Moscow}
      APP_ENV: production
      APP_PASSWORD: ${APP_PASSWORD:-123}
      PORT: 80
      DB_PATH: /data/shopping.db
    volumes:
      - ./${CONTAINER_NAME}_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/login"]
      interval: 30s
      timeout: 3s
      retries: 3
#
# NetWorks
#
networks: {}
