services:
  luanti:
    image: lscr.io/linuxserver/luanti:latest
    labels:
      - autoheal-app=true
      - com.centurylinklabs.watchtower.enable=true
    container_name: ${CONTAINER_NAME}_main
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-Europe/Moscow}"
      CLI_ARGS: >-
        --gameid mineclone2
        --world /config/.minetest/worlds/voxelibre
    volumes:
      - ./${CONTAINER_NAME}_data/config:/config/.minetest:z
    restart: unless-stopped
    ports:
      - "30000:30000/udp"
#
# Networks
#
networks: {}
