services:
  3proxy:
    image: 3proxy/3proxy:latest
    container_name: ${CONTAINER_NAME}_main
    labels:
      # watchtower
      com.centurylinklabs.watchtower.enable: true
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Moscow}
    ports:
      - "1080:1080"
    volumes:
      - ./${CONTAINER_NAME}_data/3proxy.cfg:/etc/3proxy/3proxy.cfg:ro
  shadowsocks:
    image: ghcr.io/shadowsocks/ssserver-rust:latest
    container_name: ${CONTAINER_NAME}_shadow
    labels:
      # watchtower
      com.centurylinklabs.watchtower.enable: true
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Moscow}
    ports:
      - "8388:8388/tcp"
      - "8388:8388/udp"
    volumes:
      - ./${CONTAINER_NAME}_data/config.josn:/etc/shadowsocks-rust/config.json
  #
  # BeckUps
  #
  ## main
  backup_restic_proxy:
    extends:
      file: ../restic/restic-compose-base.yaml
      service: backup
    volumes:
      - ./${CONTAINER_NAME}_data:/backup_data:ro,z
    environment:
      BACKUP_CRON: "0 38 3 * * *"
  ## prune
  prune_restic_proxy:
    extends:
      file: ../restic/restic-compose-base.yaml
      service: prune
  ## chekc
  check_restic_proxy:
    extends:
      file: ../restic/restic-compose-base.yaml
      service: check
    environment:
      CHECK_CRON: "0 30 5 * * *"
#
# NetWorks
#
networks:
  apprise_notification: 
    external: true
