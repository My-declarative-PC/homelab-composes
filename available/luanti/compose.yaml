services:
  luanti:
    runtime: runc
    image: lscr.io/linuxserver/luanti:latest
    labels:
      - autoheal-app=true
      - com.centurylinklabs.watchtower.enable=true
    container_name: ${CONTAINER_NAME}_main
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-Europe/Moscow}"
      CLI_ARGS: >-
        --gameid mineclone2
        --world /config/.minetest/worlds/voxelibre
    volumes:
      - ./${CONTAINER_NAME}_data/config:/config/.minetest:z
    restart: unless-stopped
    ports:
      - "30000:30000/udp"
  #
  # BeckUps
  #
  ## main
  backup_restic__luanti:
    extends:
      file: ../../available/restic/restic-compose-base.yaml
      service: backup
    environment:
      BACKUP_CRON: "0 55 3 */2 * *"
    volumes:
      - ./${CONTAINER_NAME}_data/config:/backup_data:ro,z
  ## prune
  prune_restic__luanti:
    extends:
      file: ../../available/restic/restic-compose-base.yaml
      service: prune
  ## chekc
  check_restic__luanti:
    extends:
      file: ../../available/restic/restic-compose-base.yaml
      service: check
#
# Networks
#
networks:
  apprise_notification:
    external: true
