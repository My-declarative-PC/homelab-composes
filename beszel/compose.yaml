services:
  beszel:
    image: henrygd/beszel:latest
    container_name: ${CONTAINER_NAME}_main
    labels:
      - autoheal-app=true
      - com.centurylinklabs.watchtower.enable=true
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Moscow}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - 8090:8090
    volumes:
      - ./beszel_socket:/beszel_socket:z
      - ./${CONTAINER_NAME}_data/config:/beszel_data:z
  beszel-agent:
    image: henrygd/beszel-agent-intel
    container_name: ${CONTAINER_NAME}_lockal_agent
    labels:
      - autoheal-app=true
      - com.centurylinklabs.watchtower.enable=true
    security_opt:
      - label:disable 
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./beszel_socket:/beszel_socket:z
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
      - ./${CONTAINER_NAME}_data/agent:/var/lib/beszel-agent:Z
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      - /home/.beszel:/extra-filesystems/nvme0n1p2__home:ro
      - /media/.beszel:/extra-filesystems/sda__media:ro
      - /backup/hdd/.beszel:/extra-filesystems/sdb__hdd:ro
    environment:
      TZ: ${TZ:-Europe/Moscow}
      LISTEN: ${LISTEN}
      KEY: ${KEY}
      TOKEN: ${TOKEN}
      HUB_URL: ${HUB_URL}
      SMART_DEVICES: ${SMART_DEVICES}
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
  # BeckUps
  ## main
  backup_restic__beszel:
    extends:
      file: ../restic/restic-compose-base.yaml
      service: backup
    volumes:
      - ./${CONTAINER_NAME}_data/config:/backup_data:ro,z
  ## prune
  prune_restic__beszel:
    extends:
      file: ../restic/restic-compose-base.yaml
      service: prune
  ## chekc
  check_restic__beszel:
    extends:
      file: ../restic/restic-compose-base.yaml
      service: check
#
# NetWorks
#
networks:
  apprise_notification:
    external: true
